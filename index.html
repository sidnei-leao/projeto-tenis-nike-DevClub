<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Projeto tênis nike</title>
</head>

<body>
    <div>
        <img src="./assets/logo-nike01.png" alt="logo-nike" class="logo-nike">
    </div>

    <div class="caixa-principal">

        <div class="caixa-texto">
            <h4 class="preco">R$ 799,00</h4>

            <h1>Nike</h1>

            <p>Este tênis Nike se destaca pelo visual moderno e esportivo, combinando estilo e conforto em
                um único modelo. Seu design leve e anatômico proporciona uma ótima experiência para caminhadas, corridas
                e uso no dia a dia.
            </p>

            <a class="botao-carrinho" href="#">Adicionar ao carrinho</a>
        </div>

        <div class="caixa-imagem-tenis">
            <img src="./assets/tenis-nike-azul.png" alt="tênis-nike" class="tenis">
        </div>

    </div>

    <div class="caixa-botoes">
        <div onclick="mudarVisual('#365fe4', 'assets/tenis-nike-azul.png')" class="botao azul"></div>
        <div onclick="mudarVisual('#FF69B4', 'assets/tenis-nike-rosa.png')" class="botao rosa"></div>
        <div onclick="mudarVisual('#556B2F', 'assets/ChatGPT Image 17 de mai. de 2026, 18_04_20.png')" class="botao verde"></div>
    </div>

    <script src="./main.js"></script>
</body>

</html>
